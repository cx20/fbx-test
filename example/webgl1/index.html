<!DOCTYPE html>
<html>
<head>
  <title>WebGL 1.0 + FBX Example</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <script src="https://unpkg.com/gl-matrix@3.4.4/gl-matrix-min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.20/dist/lil-gui.umd.min.js"></script>
</head>
<body>

<script id="vs" type="x-shader/x-vertex">
attribute vec3 aPosition;
attribute vec3 aNormal;
attribute vec4 aColor;
attribute vec2 aTexCoord;
attribute vec4 aBoneIndex;
attribute vec4 aBoneWeight;
attribute vec3 aMorph0;
attribute vec3 aMorph1;
attribute vec3 aMorph2;
attribute vec3 aMorph3;

uniform mat4 uViewProj;
uniform mat4 uModel;
uniform mat3 uNormalMat;
uniform bool uSkinned;
uniform mat4 uBones[64];
uniform vec4 uMorphWeights;

varying vec3 vNormal;
varying vec4 vColor;
varying vec2 vTexCoord;

void main() {
    vec3 morphed = aPosition
        + aMorph0 * uMorphWeights.x
        + aMorph1 * uMorphWeights.y
        + aMorph2 * uMorphWeights.z
        + aMorph3 * uMorphWeights.w;
    vec4 pos;
    vec3 nrm;
    if (uSkinned) {
        mat4 skin =
            aBoneWeight.x * uBones[int(aBoneIndex.x)] +
            aBoneWeight.y * uBones[int(aBoneIndex.y)] +
            aBoneWeight.z * uBones[int(aBoneIndex.z)] +
            aBoneWeight.w * uBones[int(aBoneIndex.w)];
        pos = skin * vec4(morphed, 1.0);
        nrm = mat3(skin) * aNormal;
    } else {
        pos = uModel * vec4(morphed, 1.0);
        nrm = uNormalMat * aNormal;
    }
    vNormal = normalize(nrm);
    vColor = aColor;
    vTexCoord = aTexCoord;
    gl_Position = uViewProj * pos;
}
</script>

<script id="fs" type="x-shader/x-fragment">
precision mediump float;

uniform vec4 uBaseColor;
uniform vec3 uLightDir;
uniform float uAmbient;
uniform bool uHasVertexColor;
uniform bool uHasTexture;
uniform sampler2D uTexture;

varying vec3 vNormal;
varying vec4 vColor;
varying vec2 vTexCoord;

void main() {
    vec3 N = normalize(vNormal);
    // Hemisphere ambient: bright top (sky), dim bottom (ground) — same idea
    // as THREE.HemisphereLight / BABYLON.HemisphericLight. Gives a soft
    // top-to-bottom gradient instead of the flat single-value ambient that
    // left meshes like Samba Dancing visibly darker than the other viewers.
    float hemi = N.y * 0.5 + 0.5;
    vec3 skyColor    = vec3(1.0);
    vec3 groundColor = vec3(0.4);
    vec3 ambientLight = mix(groundColor, skyColor, hemi);
    float diffuse = max(dot(N, normalize(uLightDir)), 0.0);
    vec3 shade = ambientLight + vec3(diffuse) * (1.0 - uAmbient);
    vec4 base;
    if (uHasTexture) {
        // Multiply the sampled texel by the material's diffuse color, matching
        // Three.js / Babylon.js. Without this, meshes whose material carries a
        // non-white DiffuseColor (e.g. morph-translation's paillotte at 0.5,0.5,0.5)
        // render brighter than they should.
        base = texture2D(uTexture, vTexCoord) * uBaseColor;
    } else if (uHasVertexColor) {
        base = vColor;
    } else {
        base = uBaseColor;
    }
    // Alpha-test for textures with cut-out transparency (e.g. morph-translation's
    // paillotte.png basket-weave). Cheaper than alpha blending and needs no depth
    // sorting; for textures without true transparency, alpha is ~1 so this is a no-op.
    if (uHasTexture && base.a < 0.5) discard;
    gl_FragColor = vec4(base.rgb * shade, base.a);
}
</script>

<div id="status"></div>
<canvas id="c"></canvas>

<script src="../common/fbx-parser.js"></script>
<script src="../common/fbx-scene.js"></script>
<script src="../common/orbit-controls.js"></script>
<script src="index.js"></script>
</body>
</html>
