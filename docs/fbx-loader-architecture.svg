<svg xmlns="http://www.w3.org/2000/svg" width="760" height="660" viewBox="0 0 760 660">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#64748b"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="660" fill="#f8fafc" rx="12"/>

  <!-- ═══════════════════════════════════════════════
       Title
  ════════════════════════════════════════════════ -->
  <text x="380" y="30" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">
    fbx-loader.js — Custom Importer Architecture
  </text>

  <!-- ═══════════════════════════════════════════════
       SECTION 1: Application Code
  ════════════════════════════════════════════════ -->
  <rect x="20" y="45" width="720" height="95" rx="10"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="380" y="63" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1e40af">
    Application Code
  </text>

  <!-- Direct API sub-box -->
  <rect x="35" y="70" width="290" height="58" rx="7"
        fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="55" y="90" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#1d4ed8">Direct API</text>
  <text x="55" y="107" font-family="ui-monospace,monospace" font-size="10" fill="#1e40af">FBXLoader.loadFBX(url, scene, opts)</text>
  <text x="55" y="121" font-family="ui-monospace,monospace" font-size="10" fill="#1e40af">FBXLoader.loadFBXFromBuffer(buf, ...)</text>

  <!-- Babylon.js API sub-box -->
  <rect x="435" y="70" width="290" height="58" rx="7"
        fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="455" y="90" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#1d4ed8">Babylon.js v9 API</text>
  <text x="455" y="107" font-family="ui-monospace,monospace" font-size="10" fill="#1e40af">BABYLON.ImportMeshAsync(url, scene)</text>
  <text x="455" y="121" font-family="ui-monospace,monospace" font-size="10" fill="#1e40af">BABYLON.LoadAssetContainerAsync(url, scene)</text>

  <!-- ═══════════════════════════════════════════════
       SECTION 2: Scene Loader Plugin (right column)
  ════════════════════════════════════════════════ -->
  <rect x="435" y="160" width="290" height="130" rx="8"
        fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="580" y="178" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#92400e">
    Scene Loader Plugin
  </text>
  <line x1="450" y1="185" x2="710" y2="185" stroke="#fcd34d" stroke-width="1"/>
  <text x="455" y="202" font-family="ui-monospace,monospace" font-size="9.5" fill="#78350f">RegisterSceneLoaderPlugin({</text>
  <text x="465" y="216" font-family="ui-monospace,monospace" font-size="9.5" fill="#78350f">name: 'fbx', extensions: '.fbx',</text>
  <text x="465" y="230" font-family="ui-monospace,monospace" font-size="9.5" fill="#78350f">createPlugin: (opts) =&gt; createFBXPlugin()</text>
  <text x="455" y="244" font-family="ui-monospace,monospace" font-size="9.5" fill="#78350f">})</text>
  <line x1="450" y1="251" x2="710" y2="251" stroke="#fcd34d" stroke-width="1"/>
  <text x="580" y="267" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#92400e">
    importMeshAsync() / loadAsync() / loadAssetContainerAsync()
  </text>

  <!-- ═══════════════════════════════════════════════
       SECTION 3: Fetch / Buffer entry point
  ════════════════════════════════════════════════ -->
  <rect x="130" y="320" width="380" height="55" rx="8"
        fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="320" y="340" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#14532d">
    Fetch / Buffer
  </text>
  <text x="320" y="358" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#166534">
    loadFBX()  →  fetch(url)  →  ArrayBuffer
  </text>
  <text x="320" y="370" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#166534">
    loadFBXFromBuffer(ArrayBuffer, baseDir, ...)
  </text>

  <!-- ═══════════════════════════════════════════════
       SECTION 4: _buildFBXScene
  ════════════════════════════════════════════════ -->
  <rect x="20" y="400" width="720" height="185" rx="10"
        fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5"/>
  <text x="380" y="420" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#14532d">
    _buildFBXScene(buffer, baseDir, scene, options)
  </text>

  <!-- parseFBX inner box -->
  <rect x="35" y="430" width="255" height="140" rx="7"
        fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="162" y="448" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#14532d">parseFBX(buffer)</text>
  <line x1="50" y1="454" x2="275" y2="454" stroke="#4ade80" stroke-width="0.8"/>
  <text x="162" y="470" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534">Binary FBX (7500–7700)</text>
  <text x="162" y="485" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534">ASCII FBX</text>
  <text x="162" y="500" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534">Zlib decompression</text>
  <line x1="50" y1="510" x2="275" y2="510" stroke="#4ade80" stroke-width="0.8"/>
  <text x="162" y="527" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#14532d">↓  FBX Node Tree (AST)</text>
  <text x="162" y="542" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#166534">Objects / Connections / Takes</text>
  <text x="162" y="556" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#166534">GlobalSettings</text>

  <!-- Build Phase inner box -->
  <rect x="310" y="430" width="415" height="140" rx="7"
        fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="517" y="448" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#14532d">Build Phase</text>
  <line x1="325" y1="454" x2="710" y2="454" stroke="#4ade80" stroke-width="0.8"/>

  <!-- Build phase items in 2 columns -->
  <text x="330" y="472" font-family="system-ui,sans-serif" font-size="10" fill="#166534">📐  Geometry (VertexData)</text>
  <text x="330" y="490" font-family="system-ui,sans-serif" font-size="10" fill="#166534">🎨  Material + Texture</text>
  <text x="330" y="508" font-family="system-ui,sans-serif" font-size="10" fill="#166534">🦴  Skeleton + Bones</text>
  <text x="520" y="472" font-family="system-ui,sans-serif" font-size="10" fill="#166534">🌳  TransformNode hierarchy</text>
  <text x="520" y="490" font-family="system-ui,sans-serif" font-size="10" fill="#166534">🏃  Animation Controls</text>
  <text x="520" y="508" font-family="system-ui,sans-serif" font-size="10" fill="#166534">💫  MorphTargetManager</text>
  <line x1="325" y1="518" x2="710" y2="518" stroke="#4ade80" stroke-width="0.8"/>
  <text x="517" y="535" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#14532d">↓  BABYLON.Node[]  (all created nodes)</text>
  <text x="517" y="551" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#166534">parented under __root__ TransformNode</text>

  <!-- ═══════════════════════════════════════════════
       SECTION 5: Babylon.js Scene (output)
  ════════════════════════════════════════════════ -->
  <rect x="20" y="607" width="720" height="42" rx="10"
        fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="380" y="623" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#4c1d95">Babylon.js Scene</text>
  <text x="380" y="640" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="10" fill="#5b21b6">
    Mesh[] · TransformNode[] · Skeleton[] · metadata.fbxAnimationControls · metadata.fbxSkeletons
  </text>

  <!-- ═══════════════════════════════════════════════
       ARROWS
  ════════════════════════════════════════════════ -->

  <!-- Direct API → fetch box -->
  <line x1="180" y1="140" x2="180" y2="318"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Babylon API → Plugin box -->
  <line x1="580" y1="140" x2="580" y2="158"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Plugin box → fetch box -->
  <path d="M 580 292 L 580 308 L 512 308 L 512 318"
        stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- fetch box → _buildFBXScene -->
  <line x1="320" y1="377" x2="320" y2="398"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- _buildFBXScene → Scene -->
  <line x1="380" y1="587" x2="380" y2="605"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- parseFBX → Build Phase (internal arrow) -->
  <line x1="292" y1="500" x2="308" y2="500"
        stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Auto-register note -->
  <rect x="435" y="303" width="290" height="32" rx="5"
        fill="#fff7ed" stroke="#fdba74" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="580" y="317" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="9.5" fill="#9a3412">
    ✦ Auto-registered when BABYLON is loaded
  </text>
  <text x="580" y="329" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="9.5" fill="#9a3412">
    before fbx-loader.js is included
  </text>
</svg>
